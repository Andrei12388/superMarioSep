    <script>
      const multiplayerPanel = document.getElementById('multiplayerPanel');
const closeMultiplayerBtn = document.getElementById('closeMultiplayerBtn');

// Show panel when clicking multiplayer button
document.querySelector('.tabBtn[data-tab="multiplayer"]').addEventListener('click', () => {
  multiplayerPanel.style.display = 'block';
});

// Close button
closeMultiplayerBtn.addEventListener('click', () => {
  multiplayerPanel.style.display = 'none';
});
     
const menuBtn = document.getElementById("menuBtn");
const menu = document.getElementById("emulatorMenu");

menuBtn.onclick = () => {
  menu.classList.toggle("open");
};

const p1Controls = document.querySelector(".moveLists");
const p2Controls = document.querySelector(".moveListsP2");
const controlPanel = document.querySelector(".onscreen-controls-panel");
const joystick = document.getElementById("joystick");

let activeTab = null;
let settingsOpen = false;

// Toggle side menu
menuBtn.onclick = (e) => {
  e.stopPropagation(); 
  menu.classList.toggle("open");
};

// Tab buttons
document.querySelectorAll(".tabBtn").forEach(btn => {
  
  btn.onclick = (e) => {
    e.stopPropagation(); 
    const tab = btn.dataset.tab;

    if (tab === "settings") {
      settingsOpen = !settingsOpen;
      if (settingsOpen) controlPanel.classList.add("show");
      else controlPanel.classList.remove("show");
      return;
    }

    if (activeTab === tab) {
  p1Controls.style.display = "none";
  p2Controls.style.display = "none";
  joystick.style.display = "none";

  // Reset button text
  if (tab === "p1") btn.textContent = "Show Player 1 Control";
  if (tab === "p2") btn.textContent = "Show Player 2 Control";

  activeTab = null;
  return;
}

    activeTab = tab;

    p1Controls.style.display = "none";
    p2Controls.style.display = "none";
    joystick.style.display = "none";

    if (tab === "p1") {
      p1Controls.style.display = "flex";
       btn.textContent = "Hide Player 1 Control";
      joystick.style.display = "block";
    }

    if (tab === "p2") {
       btn.textContent = "Hide Player 2 Control";
      p2Controls.style.display = "flex";
    }
  };
});


document.addEventListener("click", (e) => {

  if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
    menu.classList.remove("open");
  }

  if (!controlPanel.contains(e.target)) {
    controlPanel.classList.remove("show");
    settingsOpen = false;
  }
});

document.getElementById('editLayoutBtn').addEventListener('click', () => {
  if (!layoutEditMode) {
    enableLayoutEdit();
   
  } else {
    disableLayoutEdit();
   
  }
});


</script>
<script src="/socket.io/socket.io.js"></script>
 <script type="module">
  console.log("connection")
  import { connect } from './src/socket.js';

  const connectBtn = document.getElementById('connectPeerBtn');
  const peerInput = document.getElementById('peerIp');
  const peerStatus = document.getElementById('peerStatus');

  connectBtn.addEventListener('click', () => {
    const ip = peerInput.value.trim();
    if (!ip) return;

    try {
      connect(ip);
      peerStatus.textContent = 'Connecting...';
      setTimeout(() => {
        peerStatus.textContent = 'Connected!';
      }, 500); // optimistic, will update on real connection
    } catch (err) {
      console.error(err);
      peerStatus.textContent = 'Failed to connect';
    }
  });
</script>
